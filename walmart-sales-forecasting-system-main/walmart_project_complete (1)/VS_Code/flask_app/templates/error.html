<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Walmart Sales Forecasting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
        <div class="text-center">
            <div class="alert alert-danger" role="alert">
                <h1 class="display-4 fw-bold">
                    <i class="bi bi-exclamation-triangle"></i> Error
                </h1>
            </div>
            <h2 class="mb-3">{{ error_msg }}</h2>
            <p class="text-muted mb-4">{{ error_detail }}</p>
            <p class="text-muted small mb-4">
                <strong>Troubleshooting:</strong><br/>
                • Ensure train.csv, stores.csv, features.csv are in the parent directory<br/>
                • Check file permissions<br/>
                • Verify CSV files have required columns
            </p>
            <a href="/" class="btn btn-primary btn-lg">
                <i class="bi bi-arrow-left"></i> Return to Home
            </a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
